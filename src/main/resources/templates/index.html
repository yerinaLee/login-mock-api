<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>this is your index</h1>

<th:block th:if="${session.user == null}">
    <button onclick="location.href='/index/member/login'">로그인</button>
</th:block>
<th:block th:unless="${session.user == null}">
    <div>
        <p>환영합니다, <span th:text="${session.user.username}"></span> 님!</p>
    </div>
</th:block>



</body>
</html>
